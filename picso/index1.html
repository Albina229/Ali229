<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация абоба</title>
    <link rel="stylesheet" href="style1.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Создание аккаунта</h1>
        </div>
        <div class="form-container">
            <form id="registrationForm">
<div class="form-group">
                    <label for="name" class="required">Имя</label>
                    <input type="text" id="name" name="name" autofocus required>
                <div class="form-group">
                    <label for="email" class="required">Email</label>
                    <input type="email" id="email" name="email" required>
                <div class="form-group">
                    <label for="password" class="required">Пароль</label>
                    <input type="password" id="password" name="password" required>
                <div class="form-group">
                    <label for="age" class="required">Возраст</label>
                    <input type="number" id="age" name="age" min="1" max="120" required>
                <div class="form-group">
                    <label for="birthdate" class="required">Дата рождения</label>
                    <input type="date" id="birthdate" name="birthdate" required>
                <div class="form-group">
                    <label for="phone" class="required">Номер телефона</label>
                    <input type="tel" id="phone" name="phone" required>
                <div class="form-group">
                    <label for="range" class="required">Оцените наш сервис (от 1 до 10)</label>
                    <div class="range-container">
                        <input type="range" id="range" name="range" min="1" max="10" value="5" required>
                        <span class="range-value" id="rangeValue">5</span>
                    </div>
                <button type="submit" class="submit-btn">Зарегистрироваться</button>  
            </form>
        </div>
    </div>
</body>
</html>
